version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:40"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
