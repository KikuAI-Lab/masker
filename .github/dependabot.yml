version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Kyiv
    # This application currently has no lock file. Updating lower bounds does
    # not change installed versions, while security update PRs still work.
    open-pull-requests-limit: 0
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Kyiv
    # Keep the container on the repository's declared Python support line.
    # Security update PRs remain enabled.
    open-pull-requests-limit: 0
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
